{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tweets</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
    <!-- ── NAVBAR ── -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <span class="brand-icon"><i class="bi bi-layers-fill"></i></span>
      Tweets
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
  
      <div class="d-flex align-items-center gap-2">
        <form method="GET" action="{% url 'tweet_list' %}" class="d-flex align-items-center gap-2">
          <div class="search-wrapper d-none d-lg-block">
            <i class="bi bi-search search-icon"></i>
            <input type="text" name="q" placeholder="Search…" value="{{ request.GET.q|default:'' }}" />
          </div>
          <button type="submit" class="btn btn-search"><i class="bi bi-search"></i>Search</button>
        </form>
        <a href="{% url 'tweet_list' %}" class="btn-edit"> Tweet Home</a>

        {% if user.is_authenticated %}
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
         <button type="submit" class="btn-logout">Logout</button>

        </form>
        {% else %}
           <a href="{% url 'register' %}" class="btn-edit">Register</a>
           <a href="{% url 'login' %}" class="btn-edit">Login</a>

     
        {% endif %}
      </div>
    </div>
  </div>
</nav>
