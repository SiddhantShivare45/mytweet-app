{% extends "base.html" %}
{% block content %}

<section class="products-section">
  <div class="products-heading">
    <h2>{% if form.instance.pk %}Edit Tweet{% else %}Create A Tweet{% endif %}</h2>
  </div>

  <div class="form-wrapper">
    <div class="form-card">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
          <button type="submit" class="btn-edit"><i class="bi bi-check-lg"></i> Submit</button>
          <a href="{% url 'tweet_list' %}" class="btn-delete"><i class="bi bi-arrow-left"></i> Back</a>
        </div>
      </form>
    </div>
  </div>
</section>

{% endblock content %}
